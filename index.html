<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./styles.css">
    <title>PROTOTIPOS BIOEARTH</title>

    <style>
      :root {
        color: #10243d;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 82% 18%, rgba(69, 132, 237, 0.2), transparent 28%),
          radial-gradient(circle at 12% 82%, rgba(105, 195, 155, 0.24), transparent 26%),
          #f5fbff;
      }

      main {
        box-sizing: border-box;
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 72px 0;
      }

      h1 {
        max-width: 780px;
        margin: 0;
        font-size: clamp(40px, 6vw, 76px);
        line-height: 1;
        letter-spacing: -0.04em;
      }

      p {
        max-width: 700px;
        color: #49627d;
        font-size: 20px;
        line-height: 1.7;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 22px;
        margin-top: 44px;
      }

      a {
        display: block;
        min-height: 220px;
        padding: 28px;
        border: 1px solid rgba(11, 79, 138, 0.12);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.82);
        color: inherit;
        text-decoration: none;
        box-shadow: 0 24px 70px rgba(7, 45, 82, 0.12);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      a:hover {
        transform: translateY(-6px);
        box-shadow: 0 30px 90px rgba(7, 45, 82, 0.18);
      }

      h2 {
        margin: 0;
        font-size: 28px;
      }

      footer {
        margin-top: 40px;
        color: #49627d;
        font-size: 16px;
        font-weight: 700;
        text-transform: lowercase;
      }

      @media (max-width: 840px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <main>
      <h1>PROTOTIPOS BIOEARTH</h1>

      <p>Dale clic para ver cada versión.</p>

  <section class="grid" aria-label="Versiones BioEarth">

 <a href="./apps/bioearth/dist/">
  <img src="./imagenes/img1.png" alt="BioEarth versión 1">
  <h2>BioEarth versión 1</h2>
</a>

<a href="./apps/bioearth-template-style/dist/">
  <img src="./imagenes/img2.png" alt="BioEarth versión 2">
  <h2>BioEarth versión 2</h2>
</a>

<a href="./apps/bioearth-seoly-motion/dist/">
  <img src="./imagenes/img3.png" alt="BioEarth versión 3">
  <h2>BioEarth versión 3</h2>
</a>
</section>
      <footer>propuesta elaborada por chaira mileth</footer>
    </main>
  </body>
</html>
